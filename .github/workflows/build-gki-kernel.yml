name: Build Realme Q5 GKI Kernel

on:
  workflow_dispatch:
    inputs:
      enable_kernelsu:
        description: 'Enable KernelSU'
        required: false
        default: true
        type: boolean
      lto_mode:
        description: 'LTO mode (thin/full/none)'
        required: false
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none

env:
  ARCH: arm64
  SUBARCH: arm64
  KERNEL_REPO: https://github.com/realme-kernel-opensource/realme_9pro-5G_9-5G_V25_Q5-AndroidS-kernel-source
  DEVICE: Realme Q5
  CODENAME: oscar

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Free disk space
        run: |
          echo "=== Maximizing build space ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential cpio curl flex git \
            libssl-dev libncurses-dev libelf-dev \
            python3 python3-pip python3-venv \
            lzop zip unzip xz-utils zstd wget \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup AOSP Clang
        run: |
          echo "=== Setting up Clang toolchain ==="
          CLANG_VERSION="r487747c"
          CLANG_DIR="${HOME}/clang"
          mkdir -p "${CLANG_DIR}"

          wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-${CLANG_VERSION}.tar.gz" \
            -O /tmp/clang.tar.gz || {
            echo "Primary URL failed, trying mirror..."
            wget -q "https://github.com/nicedroid/aosp-clang/releases/download/clang-${CLANG_VERSION}/clang-${CLANG_VERSION}-linux-x86_64.tar.zst" \
              -O /tmp/clang.tar.zst
            zstd -d /tmp/clang.tar.zst -o /tmp/clang.tar
          }

          if [ -f /tmp/clang.tar ]; then
            tar -xf /tmp/clang.tar -C "${CLANG_DIR}/"
            echo "${CLANG_DIR}/bin" >> $GITHUB_PATH
            echo "Clang installed from AOSP"
          else
            echo "Falling back to Ubuntu clang"
            sudo apt-get install -y clang lld llvm
          fi

          rm -f /tmp/clang.tar /tmp/clang.tar.zst

      - name: Clone kernel source
        run: |
          echo "=== Cloning kernel source ==="
          git clone --depth=1 ${KERNEL_REPO} -b master kernel
          echo "Kernel source cloned"

      - name: Install KernelSU
        if: ${{ github.event.inputs.enable_kernelsu == 'true' }}
        run: |
          echo "=== Installing KernelSU ==="
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo "=== KernelSU installed ==="

      - name: Configure kernel
        run: |
          echo "=== Configuring kernel ==="
          cd kernel

          # List available defconfigs
          echo "Available configs in arch/arm64/configs/:"
          ls arch/arm64/configs/

          # Check defconfig exists
          if [ ! -f "arch/arm64/configs/gki_defconfig" ]; then
            echo "ERROR: gki_defconfig not found!"
            exit 1
          fi

          # Add KernelSU config if enabled
          if [ "${{ github.event.inputs.enable_kernelsu }}" == "true" ]; then
            echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_MANAGER=y" >> arch/arm64/configs/gki_defconfig
            echo "Added KernelSU config"
          fi

          # Generate .config
          make O=out ARCH=${ARCH} gki_defconfig

          # Run olddefconfig to resolve any new options
          make O=out ARCH=${ARCH} CC=clang LLVM=1 LLVM_IAS=1 olddefconfig

          echo "=== Kernel configured ==="

      - name: Build kernel
        run: |
          echo "=== Building kernel ==="
          cd kernel

          # LTO settings
          LTO="${{ github.event.inputs.lto_mode }}"
          if [ "$LTO" == "none" ]; then
            sed -i 's/CONFIG_LTO=y/# CONFIG_LTO is not set/' out/.config
            sed -i 's/CONFIG_LTO_THIN=y/# CONFIG_LTO_THIN is not set/' out/.config
          elif [ "$LTO" == "full" ]; then
            sed -i 's/CONFIG_LTO_THIN=y/CONFIG_LTO_FULL=y/' out/.config
          fi

          # Re-run olddefconfig after LTO changes
          make O=out ARCH=${ARCH} CC=clang LLVM=1 LLVM_IAS=1 olddefconfig

          # Build kernel image
          echo "Starting build..."
          make -j$(nproc) O=out \
            ARCH=${ARCH} \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image 2>&1 | tee build.log || {
            echo "=== Build failed, showing last 100 lines ==="
            tail -100 build.log
            exit 1
          }

          echo "=== Build complete ==="

      - name: Verify build output
        run: |
          echo "=== Verifying build output ==="
          cd kernel

          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "Image found"
            ls -lh out/arch/arm64/boot/Image
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Image.gz found"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "ERROR: No kernel image found!"
            echo "Files in out/arch/arm64/boot/:"
            ls -la out/arch/arm64/boot/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          echo "=== Packaging ==="
          cd kernel

          # Clone AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git README.md

          # Copy kernel image
          if [ -f "../out/arch/arm64/boot/Image" ]; then
            cp ../out/arch/arm64/boot/Image .
          elif [ -f "../out/arch/arm64/boot/Image.gz" ]; then
            cp ../out/arch/arm64/boot/Image.gz .
          fi

          # Copy dtbo if exists
          if [ -f "../out/arch/arm64/boot/dtbo.img" ]; then
            cp ../out/arch/arm64/boot/dtbo.img .
          fi

          # Configure AnyKernel3
          cat > anykernel.sh << 'ANYKERNEL'
# AnyKernel3 Ramdisk Mod Script
# osm0sis @ xda-developers

## AnyKernel setup
properties Kernel=true
do.devicecheck=1
device.name1=oscar
device.name2=RMX3478
device.name3=RMX3471
device.name4=RMX3472
device.name5=RMX3474
block=/dev/block/bootdevice/by-name/boot
is_slot_device=1
ramdisk_compression=auto
patch_vbmeta_flag=auto

## AnyKernel file attributes
is_slot_device=1
ramdisk_compression=auto
patch_vbmeta_flag=auto

## AnyKernel install
kernel.string=Realme Q5 (oscar) GKI Kernel by poying2018

do.patch=0

. tools/ak3-core.sh

set_perm restore
ANYKERNEL

          # Create zip
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="RealmeQ5-GKI-Kernel-${TIMESTAMP}.zip"
          zip -r9 "../${ZIP_NAME}" . -x "*.git*"

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "Package: ${ZIP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealmeQ5-GKI-Kernel
          path: kernel/AnyKernel3/../${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Create Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: RealmeQ5-GKI-$(date +%Y%m%d-%H%M%S)
          name: "Realme Q5 GKI Kernel"
          artifacts: "kernel/${{ env.ZIP_NAME }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Realme Q5 (oscar) GKI Kernel

            - **Codename**: oscar (SM6375)
            - **Kernel**: android12-5.10
            - **KernelSU**: ${{ github.event.inputs.enable_kernelsu }}
            - **LTO**: ${{ github.event.inputs.lto_mode }}

            ### Flash
            ```bash
            adb reboot recovery
            adb sideload RealmeQ5-GKI-Kernel-*.zip
            ```
