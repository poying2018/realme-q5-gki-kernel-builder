name: Build GKI Kernel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Free space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential cpio curl flex git libssl-dev libncurses-dev libelf-dev python3 lzop zip unzip xz-utils zstd wget gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu clang lld llvm
    - name: Clone kernel
      run: git clone --depth=1 https://github.com/realme-kernel-opensource/realme_9pro-5G_9-5G_V25_Q5-AndroidS-kernel-source.git kernel
    - name: KernelSU
      run: cd kernel && curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -
    - name: Configure
      run: |
        cd kernel
        echo CONFIG_KSU=y >> arch/arm64/configs/gki_defconfig
        make O=out ARCH=arm64 gki_defconfig
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 olddefconfig
    - name: Build
      run: |
        cd kernel
        make -j$(nproc) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- Image 2>&1 | tee build.log || (tail -100 build.log && exit 1)
    - name: Check
      run: |
        cd kernel
        ls -lh out/arch/arm64/boot/Image* 2>/dev/null || (echo No image && exit 1)
    - name: Package
      run: |
        cd kernel
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
        cd AnyKernel3
        rm -rf .git README.md
        cp ../out/arch/arm64/boot/Image . || cp ../out/arch/arm64/boot/Image.gz .
        cat > anykernel.sh << AK3
properties
kernel.string=Realme Q5 GKI Kernel
do.devicecheck=1
device.name1=oscar
device.name2=RMX3478
block=/dev/block/bootdevice/by-name/boot
is_slot_device=1
ramdisk_compression=auto
patch_vbmeta_flag=auto
do.patch=0
. tools/ak3-core.sh
set_perm restore
AK3
        zip -r9 ../RealmeQ5-GKI.zip .
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: kernel/RealmeQ5-GKI.zip
    - name: Release
      if: success()
      uses: ncipollo/release-action@v1
      with:
        tag: gki-run-${{ github.run_id }}
        name: Realme Q5 GKI Kernel
        artifacts: kernel/RealmeQ5-GKI.zip
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
