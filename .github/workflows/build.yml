name: Build GKI Kernel

on:
  workflow_dispatch:
    inputs:
      enable_kernelsu:
        description: 'Enable KernelSU'
        required: false
        default: true
        type: boolean
      lto_mode:
        description: 'LTO mode'
        required: false
        default: thin
        type: choice
        options:
        - thin
        - full
        - none

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential cpio curl flex git \
            libssl-dev libncurses-dev libelf-dev \
            python3 python3-pip \
            lzop zip unzip xz-utils zstd wget \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang lld llvm

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/realme-kernel-opensource/realme_9pro-5G_9-5G_V25_Q5-AndroidS-kernel-source.git -b master kernel

      - name: Install KernelSU
        if: inputs.enable_kernelsu == true
        run: |
          cd kernel
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

      - name: Configure kernel
        run: |
          cd kernel
          ls arch/arm64/configs/
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 gki_defconfig
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image 2>&1 | tee build.log || (tail -100 build.log && exit 1)

      - name: Check output
        run: |
          cd kernel
          if [ -f "out/arch/arm64/boot/Image" ]; then
            ls -lh out/arch/arm64/boot/Image
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "No kernel image found!"
            ls -la out/arch/arm64/boot/ 2>/dev/null
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          cd kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git README.md
          cp ../out/arch/arm64/boot/Image . 2>/dev/null || cp ../out/arch/arm64/boot/Image.gz . 2>/dev/null || true
          [ -f ../out/arch/arm64/boot/dtbo.img ] && cp ../out/arch/arm64/boot/dtbo.img .
          cat > anykernel.sh << 'EOF'
properties
kernel.string=Realme Q5 (oscar) GKI Kernel
do.devicecheck=1
device.name1=oscar
device.name2=RMX3478
block=/dev/block/bootdevice/by-name/boot
is_slot_device=1
ramdisk_compression=auto
patch_vbmeta_flag=auto
do.patch=0
. tools/ak3-core.sh
set_perm restore
EOF
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          zip -r9 "../RealmeQ5-GKI-${TIMESTAMP}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealmeQ5-GKI-Kernel
          path: kernel/RealmeQ5-GKI-*.zip
          if-no-files-found: error

      - name: Create Release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: GKI-${{ github.run_id }}
          name: "Realme Q5 GKI Kernel"
          artifacts: "kernel/RealmeQ5-GKI-*.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
